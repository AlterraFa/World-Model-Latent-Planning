app: latent_dreaming

common: &common_settings
  patch_size: 16
  tubelet_size: 2
  crop_size: 288
  fpcs: 16

loader:
  batch_size: 20
  num_workers: 4
  persistent_workers: true
  pin_mem: true
  dataset_config:
    <<: *common_settings
    n_clips: 1
    duration: 10.0
    random_jiggle_part: true
    allow_overlap: true
    random_jiggle: true
    channel: "F0"
    datasets_root: "./nuplan_dataset/"

model: 
  target: models.diffusion_wm.DiffusionWM
  params:
    compile: false
    timescale: 1.0

    encoder_config:
      <<: *common_settings
      name: vjepa2_1_vit_base_384
      load_from: facebookresearch/vjepa2
      source: github
      use_sdpa: true
      use_rope: true
      use_activation_checkpointing: true

    diffuser_config:
      target: networks.DiT.dit.STDiT
      params:
        max_num_frames: 64
        diffuse_dim: &diffuse_dim 512
        depth: 24
        num_heads: 16
        mlp_ratio: 4
        input_size:
        - ${div:${common.crop_size}, ${common.patch_size}}
        - ${div:${common.crop_size}, ${common.patch_size}}
        patch_size: 1
        dropout: 0.0
        ctx_noise_aug_ratio: 0.1
        ctx_noise_aug_prob: 0.5
        drop_ctx_rate: 0.1

data_aug: {}

loss: {}

optimization:
  ema:
    - 0.99925
    - 0.99925
  ipe: 150
  anneal: 30
  epochs: 50
  warmup: 10
  learning_rate:
    scale: 1.0
    start: 4.5e-05
    ref: 0.000125
    end: 0.0
  weight_decay:
    exclude: true
    start: 0.04
    end: 0.015

meta:
  save_root_dir: ./Experiment
  dtype: bfloat16
  save_every_freq: 5
  seed: 239
  sync_gc: true

checkpoint:
  patience: 10
  min_delta: 0.0005

logging: 
  progress_type: table
  save_csv: true
  save_batch_csv: true
  save_epoch_csv: true
  log_model_graph: true
  use_wandb: true