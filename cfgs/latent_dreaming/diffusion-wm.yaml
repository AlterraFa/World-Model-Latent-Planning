app: latent_dreaming

common: &common_settings
  patch_size: 16
  tubelet_size: 2
  crop_size: &crop_size 288
  fpcs: 16

loader:
  batch_size: 20
  num_workers: 4
  persistent_workers: true
  pin_memory: false
  dataset:
    target: datasets.dataset.NuplanNumpyDataset  # or NuplanSQLiteDataset
    params:
      <<: *common_settings
      data_root: "./nuplan_dataset/"  # root scanned for .npz / .db files
      db_scan_depth: 3
      image_root: "./nuplan_dataset/"
      duration_s: 10.0
      n_clips: 1
      allow_clip_overlap: true
      random_jiggle_part: true
  collator:
    target: datasets.collator.CollateNuplan  # or CollateNuplan

model: 
  target: models.diffusion_wm.DiffusionWM
  params:
    compile: false
    timescale: 1.0

    encoder_config:
      <<: *common_settings
      name: vjepa2_1_vit_base_384
      load_from: facebookresearch/vjepa2
      source: github
      use_sdpa: true
      use_rope: true
      use_activation_checkpointing: true

    diffuser_config:
      target: networks.DiT.dit.STDiT
      params:
        max_num_frames: 64
        diffuse_dim: &diffuse_dim 512
        depth: 24
        num_heads: 16
        mlp_ratio: 4
        input_size:
        - ${div:${common.crop_size}, ${common.patch_size}}
        - ${div:${common.crop_size}, ${common.patch_size}}
        patch_size: 1
        dropout: 0.0
        ctx_noise_aug_ratio: 0.1
        ctx_noise_aug_prob: 0.5
        drop_ctx_rate: 0.1
        grad_checkpointing: true

data_aug: 
  auto_augment: false
  horizontal_flip: false
  motion_shift: false
  random_resize_aspect_ratio:
  - 0.75
  - 1.35
  random_resize_scale:
  - 1.0
  - 1.777
  reprob: 0.0
  normalize: 
  - [0.485, 0.456, 0.406]
  - [0.229, 0.224, 0.225]
  crop_size: *crop_size

loss:
  context_length: 2 #-- seconds
  loss_exp: 2.0
  gen_chunksz: 5 #-- Timestep
  randomize_goal: true

optimization:
  ema:
    - 0.99925
    - 0.99925
  ipe: 150
  anneal: 30
  epochs: 50
  warmup: 10
  learning_rate:
    scale: 1.0
    start: 4.5e-05
    ref: 0.000125
    end: 0.0
  weight_decay:
    exclude: true
    start: 0.04
    end: 0.015

meta:
  save_root_dir: ./Experiment
  dtype: bfloat16
  save_every_freq: 5
  seed: 239
  sync_gc: true

checkpoint:
  patience: 10
  min_delta: 0.0005

logging: 
  progress_type: table
  save_csv: true
  save_batch_csv: true
  save_epoch_csv: true
  log_batch_scalars: true
  log_model_graph: true
  backends:
    - target: utils.training_logger.TensorBoardBackend
      params:
        log_dir: null                 # filled in at runtime with run_dir

    - target: utils.training_logger.WandbBackend
      params:
        project: null                 # filled in with app_name
        run_name: null                # filled in with run_name
        log_dir: null                 # filled in with run_dir
        resume: null                  # "allow" when resuming, else None

    # - target: utils.training_logger.MLflowBackend
    #   params:
    #     experiment_name: latent_dreaming
    #     run_name: null
    #     tracking_uri: http://localhost:5000
    #     log_model_artifact: false